、<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全能数值转换工具 (百分比/小数/分数)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* 日间模式变量 */
            --bg-gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            --container-bg: #ffffff;
            --text-color: #333;
            --text-secondary: #7f8c8d;
            --text-light: #95a5a6;
            --header-color: #2c3e50;
            --label-color: #34495e;
            --input-bg: #ffffff;
            --input-border: #ddd;
            --primary-color: #3498db;
            --primary-hover: #2980b9;
            --success-color: #27ae60;
            --success-dark: #219653;
            --danger-color: #e74c3c;
            --danger-dark: #c0392b;
            --warning-color: #f39c12;
            --warning-hover: #d68910;
            --result-bg: #f8f9fa;
            --result-border: #2ecc71;
            --example-border: #eee;
            --shadow-color: rgba(0, 0, 0, 0.2);
            --footer-color: rgba(255, 255, 255, 0.8);
        }

        .dark-mode {
            /* 暗色模式变量 */
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --container-bg: #1e293b;
            --text-color: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-light: #64748b;
            --header-color: #f1f5f9;
            --label-color: #cbd5e1;
            --input-bg: #0f172a;
            --input-border: #334155;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --success-color: #22c55e;
            --success-dark: #16a34a;
            --danger-color: #ef4444;
            --danger-dark: #dc2626;
            --warning-color: #f59e0b;
            --warning-hover: #d97706;
            --result-bg: #0f172a;
            --result-border: #22c55e;
            --example-border: #334155;
            --shadow-color: rgba(0, 0, 0, 0.4);
            --footer-color: rgba(255, 255, 255, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s, box-shadow 0.3s;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background-color: var(--container-bg);
            border-radius: 15px;
            box-shadow: 0 10px 30px var(--shadow-color);
            width: 100%;
            max-width: 550px;
            padding: 30px;
            margin: 20px 0;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--primary-color);
            text-decoration: none;
            font-size: 0.95rem;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.3s;
            background: transparent;
        }

        .back-link:hover {
            background: var(--primary-color);
            color: white;
        }

        .theme-toggle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--input-bg);
            border: 2px solid var(--input-border);
        }

        .theme-toggle:hover {
            transform: rotate(15deg);
            border-color: var(--primary-color);
        }

        .theme-toggle i {
            font-size: 1.2rem;
            color: var(--primary-color);
        }

        h1 {
            text-align: center;
            color: var(--header-color);
            margin-bottom: 15px;
            font-size: 26px;
        }

        .description {
            text-align: center;
            margin-bottom: 25px;
            color: var(--text-secondary);
            line-height: 1.5;
            font-size: 15px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--label-color);
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--input-border);
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            background: var(--input-bg);
            color: var(--text-color);
        }

        input:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        input::placeholder {
            color: var(--text-light);
        }

        /* 将按钮区改为网格布局以容纳更多按钮 */
        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: var(--primary-color);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        #toFraction {
            background-color: var(--warning-color);
        }

        #toFraction:hover {
            background-color: var(--warning-hover);
        }

        #clearBtn {
            grid-column: span 2;
            background-color: var(--danger-color);
        }

        #clearBtn:hover {
            background-color: var(--danger-dark);
        }

        .result {
            background-color: var(--result-bg);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--result-border);
            margin-top: 20px;
        }

        .result h3 {
            color: var(--header-color);
            margin-bottom: 10px;
        }

        #resultText {
            font-size: 18px;
            color: var(--success-color);
            font-weight: 600;
            word-break: break-all;
        }

        .examples {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--example-border);
        }

        .examples h3 {
            color: var(--header-color);
            margin-bottom: 15px;
            font-size: 16px;
        }

        .example-item {
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: var(--footer-color);
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .buttons {
                grid-template-columns: 1fr;
            }

            #clearBtn {
                grid-column: span 1;
            }

            .header-row {
                flex-direction: column;
                gap: 15px;
            }

            .back-link {
                order: 2;
            }

            .theme-toggle {
                order: 1;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header-row">
            <a href="/" class="back-link">
                <i class="fas fa-arrow-left"></i>
                返回主页
            </a>
            <div class="theme-toggle" id="themeToggle" title="切换主题">
                <i class="fas fa-moon"></i>
            </div>
        </div>

        <h1>全能数值转换工具</h1>
        <p class="description">支持在 <b>百分比</b>、<b>小数</b> 和 <b>分数</b> 之间进行精准解析与快速转换。</p>

        <div class="input-group">
            <label for="inputValue">输入任意数值：</label>
            <input type="text" id="inputValue" placeholder="支持格式: 25%, 0.25, 1/4 ...">
        </div>

        <div class="buttons">
            <button id="toDecimal">
                <i class="fas fa-arrow-right"></i> 转为小数
            </button>
            <button id="toPercentage">
                <i class="fas fa-percent"></i> 转为百分比
            </button>
            <button id="toFraction">
                <i class="fas fa-divide"></i> 转为分数
            </button>
            <button id="clearBtn">
                <i class="fas fa-trash-alt"></i> 清除输入
            </button>
        </div>

        <div class="result">
            <h3>转换结果：</h3>
            <p id="resultText">请输入值并选择目标格式</p>
        </div>

        <div class="examples">
            <h3>💡 使用示例 (输入任意格式)：</h3>
            <p class="example-item">• <b>转为小数：</b>输入 <code>25%</code> 或 <code>1/4</code> → 结果 <code>0.25</code></p>
            <p class="example-item">• <b>转为百分比：</b>输入 <code>0.75</code> 或 <code>3/4</code> → 结果 <code>75%</code></p>
            <p class="example-item">• <b>转为分数：</b>输入 <code>0.333333</code> 或 <code>33.3333%</code> → 结果 <code>1/3</code></p>
        </div>
    </div>

    <footer>
        <p>© <span id="currentYear"></span> 全能数值转换工具 | 精准计算，简单易用</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // 设置版权年份
            document.getElementById('currentYear').textContent = new Date().getFullYear();

            // =============== 主题切换功能 ===============
            function initTheme() {
                const savedTheme = localStorage.getItem('theme');
                const themeToggle = document.getElementById('themeToggle');
                const body = document.body;
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

                if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                    body.classList.add('dark-mode');
                    themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
                } else {
                    body.classList.remove('dark-mode');
                    themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
                }
            }

            function toggleTheme() {
                const body = document.body;
                const themeToggle = document.getElementById('themeToggle');

                if (body.classList.contains('dark-mode')) {
                    body.classList.remove('dark-mode');
                    themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
                    localStorage.setItem('theme', 'light');
                } else {
                    body.classList.add('dark-mode');
                    themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
                    localStorage.setItem('theme', 'dark');
                }
            }

            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                if (!localStorage.getItem('theme')) {
                    if (e.matches) {
                        document.body.classList.add('dark-mode');
                        document.getElementById('themeToggle').innerHTML = '<i class="fas fa-sun"></i>';
                    } else {
                        document.body.classList.remove('dark-mode');
                        document.getElementById('themeToggle').innerHTML = '<i class="fas fa-moon"></i>';
                    }
                }
            });

            initTheme();
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);

            // =============== 核心转换逻辑 ===============
            const inputValue = document.getElementById('inputValue');
            const resultText = document.getElementById('resultText');

            // 统一错误提示
            function showError(msg) {
                resultText.textContent = msg;
                resultText.style.color = 'var(--danger-color)';
            }

            // 统一成功提示
            function showResult(text) {
                resultText.textContent = `结果：${text}`;
                resultText.style.color = 'var(--success-color)';
            }

            // 小数转最简分数算法 (连分数法)
            function floatToFraction(decimal) {
                if (isNaN(decimal)) return "无效";
                if (decimal === 0) return "0";
                if (!Number.isFinite(decimal)) return "∞";

                const sign = decimal < 0 ? "-" : "";
                decimal = Math.abs(decimal);

                // 如果本身是整数
                if (Number.isInteger(decimal)) return sign + decimal;

                const tolerance = 1.0E-6;
                let h1 = 1, h2 = 0;
                let k1 = 0, k2 = 1;
                let b = decimal;

                do {
                    let a = Math.floor(b);
                    let aux = h1; h1 = a * h1 + h2; h2 = aux;
                    aux = k1; k1 = a * k1 + k2; k2 = aux;
                    b = 1 / (b - a);
                } while (Math.abs(decimal - h1 / k1) > decimal * tolerance);

                // 如果分母为1，直接返回分子
                if (k1 === 1) return sign + h1;
                return sign + h1 + "/" + k1;
            }

            // 统一输入解析器（将任何合法的输入都转化为基础小数）
            function parseInput() {
                let val = inputValue.value.trim().replace(/\s+/g, '');
                if (val === '') {
                    showError('请输入一个值');
                    return null;
                }

                // 1. 处理分数格式 (如 3/4)
                if (val.includes('/')) {
                    const parts = val.split('/');
                    if (parts.length !== 2) {
                        showError('分数格式不正确 (例如: 3/4)');
                        return null;
                    }
                    const num = parseFloat(parts[0]);
                    const den = parseFloat(parts[1]);
                    if (isNaN(num) || isNaN(den)) {
                        showError('分数中包含无效数字');
                        return null;
                    }
                    if (den === 0) {
                        showError('分母不能为零');
                        return null;
                    }
                    return num / den;
                }

                // 2. 处理百分比格式 (如 25%)
                if (val.includes('%')) {
                    const num = parseFloat(val.replace('%', ''));
                    if (isNaN(num)) {
                        showError('百分比中包含无效数字');
                        return null;
                    }
                    return num / 100;
                }

                // 3. 处理常规数字格式
                const num = parseFloat(val);
                if (isNaN(num)) {
                    showError('请输入有效的数字');
                    return null;
                }
                return num;
            }

            // 绑定按钮事件
            document.getElementById('toDecimal').addEventListener('click', function () {
                let val = parseInput();
                if (val !== null) {
                    // 解决浮点数精度丢失问题并去除末尾多余的0
                    let formatted = Number(val.toPrecision(12));
                    showResult(parseFloat(formatted.toFixed(10)));
                }
            });

            document.getElementById('toPercentage').addEventListener('click', function () {
                let val = parseInput();
                if (val !== null) {
                    let percent = val * 100;
                    let formatted = Number(percent.toPrecision(12));
                    showResult(parseFloat(formatted.toFixed(8)) + "%");
                }
            });

            document.getElementById('toFraction').addEventListener('click', function () {
                let val = parseInput();
                if (val !== null) {
                    showResult(floatToFraction(val));
                }
            });

            document.getElementById('clearBtn').addEventListener('click', function () {
                inputValue.value = '';
                resultText.textContent = '请输入值并选择目标格式';
                resultText.style.color = 'var(--success-color)';
                inputValue.focus();
            });

            // 按 Enter 键默认触发转换为小数
            inputValue.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    document.getElementById('toDecimal').click();
                }
            });
        });
    </script>
</body>

</html>
