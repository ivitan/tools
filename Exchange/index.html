<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全能数值转换工作台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            --container-bg: #ffffff;
            --text-color: #333;
            --text-secondary: #7f8c8d;
            --text-light: #95a5a6;
            --header-color: #2c3e50;
            --label-color: #34495e;
            --input-bg: #ffffff;
            --input-border: #ddd;
            --primary-color: #3498db;
            --primary-hover: #2980b9;
            --success-color: #27ae60;
            --danger-color: #e74c3c;
            --warning-color: #f39c12;
            --purple-color: #9b59b6;
            --info-color: #00bcd4;
            --result-bg: #f8f9fa;
            --result-border: #2ecc71;
            --border-color: #eee;
            --shadow-color: rgba(0, 0, 0, 0.2);
            --footer-color: rgba(255, 255, 255, 0.8);
        }

        .dark-mode {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --container-bg: #1e293b;
            --text-color: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-light: #64748b;
            --header-color: #f1f5f9;
            --label-color: #cbd5e1;
            --input-bg: #0f172a;
            --input-border: #334155;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --success-color: #22c55e;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --purple-color: #a855f7;
            --info-color: #06b6d4;
            --result-bg: #0f172a;
            --result-border: #22c55e;
            --border-color: #334155;
            --shadow-color: rgba(0, 0, 0, 0.4);
            --footer-color: rgba(255, 255, 255, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s, box-shadow 0.3s;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background-color: var(--container-bg);
            border-radius: 15px;
            box-shadow: 0 10px 30px var(--shadow-color);
            width: 100%;
            max-width: 600px;
            padding: 30px;
            margin: 20px 0;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .theme-toggle {
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; background: var(--input-bg);
            border: 2px solid var(--input-border);
        }

        h1 { text-align: center; color: var(--header-color); margin-bottom: 10px; font-size: 24px; }
        .description { text-align: center; margin-bottom: 25px; color: var(--text-secondary); font-size: 14px; }

        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--label-color); }
        input {
            width: 100%; padding: 12px 15px; border: 2px solid var(--input-border);
            border-radius: 8px; font-size: 16px; background: var(--input-bg); color: var(--text-color);
        }
        input:focus { border-color: var(--primary-color); outline: none; }

        /* 三列网格布局 */
        .buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px; margin-bottom: 20px;
        }

        button {
            padding: 10px; border: none; border-radius: 8px;
            color: white; font-size: 14px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }
        button:active { transform: scale(0.98); }

        #toDecimal { background-color: var(--primary-color); }
        #toPercentage { background-color: var(--success-color); }
        #toFraction { background-color: var(--warning-color); }
        #toPermille { background-color: var(--purple-color); }
        #toScientific { background-color: var(--info-color); }
        #clearBtn { background-color: var(--danger-color); }

        .result-wrapper {
            background-color: var(--result-bg); padding: 15px;
            border-radius: 8px; border-left: 4px solid var(--result-border);
            margin-top: 20px; position: relative;
        }
        .result-wrapper h3 { color: var(--header-color); margin-bottom: 8px; font-size: 16px; }
        #resultText { font-size: 20px; color: var(--success-color); font-weight: bold; word-break: break-all; padding-right: 40px; }
        
        .copy-btn {
            position: absolute; right: 15px; bottom: 15px;
            background: none; border: none; color: var(--text-secondary);
            font-size: 20px; cursor: pointer; padding: 5px;
        }
        .copy-btn:hover { color: var(--primary-color); transform: scale(1.1); }

        /* 历史记录面板 */
        .history-panel { margin-top: 25px; border-top: 1px solid var(--border-color); padding-top: 15px; }
        .history-panel h3 { color: var(--header-color); font-size: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        #clearHistory { background: none; border: none; color: var(--danger-color); font-size: 12px; cursor: pointer; padding: 0; }
        .history-list { list-style: none; max-height: 120px; overflow-y: auto; }
        .history-list li {
            font-size: 13px; color: var(--text-secondary); padding: 6px 0;
            border-bottom: 1px dashed var(--border-color); display: flex; justify-content: space-between;
        }

        /* Toast 提示 */
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8); color: white; padding: 10px 20px;
            border-radius: 20px; font-size: 14px; pointer-events: none;
            opacity: 0; transition: opacity 0.3s; z-index: 1000;
        }
        .toast.show { opacity: 1; }

        @media (max-width: 500px) {
            .buttons { grid-template-columns: repeat(2, 1fr); }
            #clearBtn { grid-column: span 2; }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header-row">
            <div style="width: 40px;"></div> <!-- 占位保持居中 -->
            <div class="theme-toggle" id="themeToggle" title="切换主题">
                <i class="fas fa-moon"></i>
            </div>
        </div>

        <h1>全能数值转换工作台</h1>
        <p class="description">支持小数、百分比、分数、千分率及科学计数法的极速转换。</p>

        <div class="input-group">
            <label for="inputValue">输入任意数值：</label>
            <input type="text" id="inputValue" placeholder="格式: 25%, 0.25, 1/4, 250‰ ...">
        </div>

        <div class="buttons">
            <button id="toDecimal"><i class="fas fa-arrow-right"></i> 转小数</button>
            <button id="toPercentage"><i class="fas fa-percent"></i> 转百分比</button>
            <button id="toFraction"><i class="fas fa-divide"></i> 转分数</button>
            <button id="toPermille"><i class="fas fa-circle-notch"></i> 转千分率</button>
            <button id="toScientific"><i class="fas fa-atom"></i> 科学计数</button>
            <button id="clearBtn"><i class="fas fa-trash-alt"></i> 清除</button>
        </div>

        <div class="result-wrapper">
            <h3>转换结果：</h3>
            <p id="resultText">等待输入...</p>
            <button class="copy-btn" id="copyBtn" title="复制结果">
                <i class="far fa-copy"></i>
            </button>
        </div>

        <div class="history-panel">
            <h3><span><i class="fas fa-history"></i> 转换历史</span> <button id="clearHistory">清空</button></h3>
            <ul class="history-list" id="historyList">
                <li style="border:none; color: var(--text-light);">暂无记录</li>
            </ul>
        </div>
    </div>

    <div class="toast" id="toast">✅ 已复制到剪贴板</div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // 主题逻辑保持不变
            const themeToggle = document.getElementById('themeToggle');
            const body = document.body;
            
            function toggleTheme() {
                if (body.classList.contains('dark-mode')) {
                    body.classList.remove('dark-mode');
                    themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
                    localStorage.setItem('theme', 'light');
                } else {
                    body.classList.add('dark-mode');
                    themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
                    localStorage.setItem('theme', 'dark');
                }
            }
            if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                body.classList.add('dark-mode'); themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
            }
            themeToggle.addEventListener('click', toggleTheme);

            // ================= 核心逻辑 =================
            const inputValue = document.getElementById('inputValue');
            const resultText = document.getElementById('resultText');
            const historyList = document.getElementById('historyList');
            let historyData = [];

            // 提示 Toast
            function showToast() {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            }

            // 复制功能
            document.getElementById('copyBtn').addEventListener('click', () => {
                const text = resultText.textContent;
                if(text && text !== "等待输入..." && !text.includes("无效")) {
                    navigator.clipboard.writeText(text).then(showToast);
                }
            });

            // 记录历史
            function addHistory(input, result, type) {
                historyData.unshift({ input, result, type });
                if (historyData.length > 5) historyData.pop(); // 最多存5条
                renderHistory();
            }

            function renderHistory() {
                if (historyData.length === 0) {
                    historyList.innerHTML = '<li style="border:none; color: var(--text-light);">暂无记录</li>';
                    return;
                }
                historyList.innerHTML = historyData.map(item => 
                    `<li><span>${item.input} ➔ <b>${item.result}</b></span> <span>[${item.type}]</span></li>`
                ).join('');
            }

            document.getElementById('clearHistory').addEventListener('click', () => {
                historyData = []; renderHistory();
            });

            function showError(msg) {
                resultText.textContent = msg;
                resultText.style.color = 'var(--danger-color)';
            }

            function processResult(val, originalInput, calcFn, typeName) {
                if (val === null) return;
                const result = calcFn(val);
                resultText.textContent = result;
                resultText.style.color = 'var(--success-color)';
                addHistory(originalInput, result, typeName);
            }

            // 强化版输入解析器 (增加了 ‰ 支持)
            function parseInput() {
                let val = inputValue.value.trim().replace(/\s+/g, '');
                if (!val) { showError('请输入一个值'); return null; }

                if (val.includes('/')) {
                    const parts = val.split('/');
                    const num = parseFloat(parts[0]), den = parseFloat(parts[1]);
                    if (isNaN(num) || isNaN(den) || den === 0) { showError('分数格式错误'); return null; }
                    return num / den;
                }
                if (val.includes('%')) return parseFloat(val.replace('%', '')) / 100;
                if (val.includes('‰')) return parseFloat(val.replace('‰', '')) / 1000;

                const num = parseFloat(val);
                if (isNaN(num)) { showError('包含无效数字'); return null; }
                return num;
            }

            // 算法：转最简分数
            function floatToFraction(decimal) {
                if (decimal === 0) return "0";
                const sign = decimal < 0 ? "-" : "";
                decimal = Math.abs(decimal);
                if (Number.isInteger(decimal)) return sign + decimal;
                
                const tolerance = 1.0E-6;
                let h1 = 1, h2 = 0, k1 = 0, k2 = 1, b = decimal;
                do {
                    let a = Math.floor(b);
                    let aux = h1; h1 = a * h1 + h2; h2 = aux;
                    aux = k1; k1 = a * k1 + k2; k2 = aux;
                    b = 1 / (b - a);
                } while (Math.abs(decimal - h1 / k1) > decimal * tolerance);
                return k1 === 1 ? sign + h1 : sign + h1 + "/" + k1;
            }

            // 按钮事件绑定
            document.getElementById('toDecimal').addEventListener('click', () => 
                processResult(parseInput(), inputValue.value, v => parseFloat(Number(v.toPrecision(12)).toFixed(10)), '转小数'));

            document.getElementById('toPercentage').addEventListener('click', () => 
                processResult(parseInput(), inputValue.value, v => parseFloat(Number((v * 100).toPrecision(12)).toFixed(8)) + "%", '转百分比'));

            document.getElementById('toFraction').addEventListener('click', () => 
                processResult(parseInput(), inputValue.value, floatToFraction, '转分数'));

            document.getElementById('toPermille').addEventListener('click', () => 
                processResult(parseInput(), inputValue.value, v => parseFloat(Number((v * 1000).toPrecision(12)).toFixed(8)) + "‰", '转千分率'));

            document.getElementById('toScientific').addEventListener('click', () => 
                processResult(parseInput(), inputValue.value, v => v.toExponential(4), '科学计数'));

            document.getElementById('clearBtn').addEventListener('click', () => {
                inputValue.value = ''; resultText.textContent = '等待输入...';
            });

            inputValue.addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('toDecimal').click(); });
        });
    </script>
</body>
</html>
