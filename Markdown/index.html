<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown 编辑器 · 双向跟随 + PDF导出</title>

    <!-- Marked.js -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <!-- Highlight.js -->
    <link rel="stylesheet" id="hljs-theme" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- html2pdf.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg-primary: #f5f5f0;
            --bg-secondary: #ffffff;
            --bg-tertiary: #fafaf8;
            --bg-hover: #f0f0eb;
            --bg-code: #f4f4f0;
            --bg-code-block: #f8f8f5;
            --bg-toolbar: #ffffff;
            --bg-input: #fdfdfc;
            --bg-scrollbar-thumb: #c8c8c0;
            --bg-scrollbar-track: transparent;
            --text-primary: #2c2c28;
            --text-secondary: #555550;
            --text-tertiary: #888880;
            --text-code: #3a3a35;
            --text-placeholder: #b0b0a8;
            --border-primary: #e0e0d8;
            --border-secondary: #e8e8e0;
            --border-focus: #a0a098;
            --accent: #5b7b5a;
            --accent-hover: #4a6a49;
            --accent-light: #e8f0e8;
            --accent-subtle: #f0f5f0;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.08);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            --transition-fast: 0.15s ease;
            --transition-normal: 0.25s ease;
            --transition-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --font-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            --font-sans: 'Inter', 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
        }

        .dark-mode {
            --bg-primary: #1c1c22;
            --bg-secondary: #24242d;
            --bg-tertiary: #282832;
            --bg-hover: #2e2e38;
            --bg-code: #2a2a35;
            --bg-code-block: #1f1f28;
            --bg-toolbar: #24242d;
            --bg-input: #262630;
            --bg-scrollbar-thumb: #4a4a58;
            --bg-scrollbar-track: transparent;
            --text-primary: #e0e0e6;
            --text-secondary: #b5b5c0;
            --text-tertiary: #808090;
            --text-code: #d0d0da;
            --text-placeholder: #606070;
            --border-primary: #353545;
            --border-secondary: #3a3a4a;
            --border-focus: #6a6a7a;
            --accent: #8ab88a;
            --accent-hover: #9cc89c;
            --accent-light: #2a3a2f;
            --accent-subtle: #252e28;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.25);
            --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.35);
            --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            height: 100%;
        }
        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.25s ease, color 0.25s ease;
        }

        /* 更全面的过渡保证暗色模式平滑切换 */
        .header,
        .toolbar,
        .mobile-tabs,
        .panel,
        .panel-header,
        .editor-textarea,
        .preview-wrapper,
        .markdown-body,
        .markdown-body *,
        .divider-bar,
        .btn-theme-toggle,
        .btn-export-pdf,
        .toolbar-btn {
            transition: background 0.25s ease, color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-scrollbar-track);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--bg-scrollbar-thumb);
            border-radius: 3px;
            transition: background 0.25s ease;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-primary);
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
        }
        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-logo {
            width: 34px;
            height: 34px;
            border-radius: var(--radius-sm);
            background: var(--accent);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
        }
        .header-title {
            font-weight: 650;
            letter-spacing: -0.01em;
        }
        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .btn-theme-toggle,
        .btn-export-pdf {
            height: 44px;
            border-radius: 22px;
            border: 2px solid var(--border-secondary);
            background: var(--bg-tertiary);
            cursor: pointer;
            font-size: 16px;
            transition: all 0.25s ease;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            padding: 0 16px;
            gap: 6px;
            white-space: nowrap;
            font-weight: 550;
            font-family: var(--font-sans);
        }
        .btn-theme-toggle {
            width: 44px;
            padding: 0;
            font-size: 20px;
            border-radius: 50%;
        }
        .btn-theme-toggle:hover,
        .btn-export-pdf:hover {
            background: var(--accent-light);
            border-color: var(--accent);
            transform: scale(1.02);
        }
        .btn-theme-toggle .icon-sun,
        .btn-theme-toggle .icon-moon {
            position: absolute;
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
        .dark-mode .icon-sun {
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }
        .dark-mode .icon-moon {
            opacity: 0;
            transform: rotate(-90deg) scale(0.5);
        }
        .icon-sun {
            opacity: 0;
            transform: rotate(90deg) scale(0.5);
        }
        .icon-moon {
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }

        .toolbar {
            display: flex;
            gap: 2px;
            padding: 6px 14px;
            background: var(--bg-toolbar);
            border-bottom: 1px solid var(--border-secondary);
            flex-shrink: 0;
            overflow-x: auto;
        }
        .toolbar-btn {
            width: 32px;
            height: 32px;
            border: 1.5px solid transparent;
            background: transparent;
            cursor: pointer;
            font-size: 15px;
            color: var(--text-secondary);
            border-radius: var(--radius-sm);
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toolbar-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--border-secondary);
        }
        .toolbar-divider {
            width: 1px;
            height: 20px;
            background: var(--border-secondary);
            margin: 0 4px;
        }

        .mobile-tabs {
            display: none;
            gap: 4px;
            padding: 4px 12px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-primary);
        }
        .mobile-tab-btn {
            flex: 1;
            padding: 10px;
            border: 1.5px solid transparent;
            background: transparent;
            cursor: pointer;
            font-weight: 550;
            color: var(--text-tertiary);
            border-radius: var(--radius-md);
            text-align: center;
            transition: all 0.15s ease;
        }
        .mobile-tab-btn.active {
            background: var(--accent-light);
            color: var(--accent);
            border-color: var(--accent);
        }

        .main-container {
            display: flex;
            flex: 1;
            min-height: 0;
        }
        .divider-bar {
            width: 6px;
            background: var(--border-primary);
            cursor: col-resize;
            flex-shrink: 0;
        }
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            overflow: hidden;
            background: var(--bg-input);
        }
        .panel-header {
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-secondary);
            font-size: 0.78rem;
            color: var(--text-tertiary);
            display: flex;
            justify-content: space-between;
        }
        .panel-header .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .dot-edit { background: #e8a860; }
        .dot-preview { background: #6aab6a; }

        .editor-textarea {
            flex: 1;
            width: 100%;
            border: none;
            outline: none;
            resize: none;
            padding: 18px 20px;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            line-height: 1.7;
            background: var(--bg-input);
            color: var(--text-primary);
            transition: background 0.25s ease, color 0.25s ease;
        }
        .editor-textarea::placeholder {
            color: var(--text-placeholder);
        }
        .preview-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 18px 24px;
            background: var(--bg-input);
            word-wrap: break-word;
            transition: background 0.25s ease;
        }
        .markdown-body {
            font-family: var(--font-sans);
            color: var(--text-primary);
            line-height: 1.75;
            max-width: 780px;
        }
        .markdown-body h1 { border-bottom: 2px solid var(--border-primary); }
        .markdown-body h2 { border-bottom: 1.5px solid var(--border-secondary); }
        .markdown-body pre {
            background: var(--bg-code-block);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-md);
            padding: 16px;
            overflow-x: auto;
        }
        .markdown-body code {
            font-family: var(--font-mono);
            background: var(--bg-code);
            padding: 2px 6px;
            border-radius: 3px;
        }
        .markdown-body blockquote {
            border-left: 3.5px solid var(--accent);
            margin: 1em 0;
            padding: 0.6em 1em;
            background: var(--accent-subtle);
        }
        .markdown-body table {
            border-collapse: collapse;
            width: 100%;
        }
        .markdown-body th,
        .markdown-body td {
            border: 1px solid var(--border-primary);
            padding: 10px 14px;
        }
        .markdown-body a { color: var(--accent); }

        @media (max-width: 768px) {
            .mobile-tabs { display: flex; }
            .main-container { flex-direction: column; }
            .divider-bar { display: none; }
            .panel.panel-preview { display: none; }
            .panel.panel-preview.mobile-visible { display: flex; }
            .panel.panel-editor.mobile-hidden { display: none; }
            .editor-textarea { padding: 14px 16px; }
            .btn-export-pdf { padding: 0 12px; font-size: 15px; height: 38px; }
            .btn-theme-toggle { width: 38px; height: 38px; font-size: 18px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-brand">
            <div class="header-logo">M</div>
            <span class="header-title">Markdown 编辑器</span>
            <span class="header-subtitle">· 双向跟随</span>
        </div>
        <div class="header-actions">
            <button class="btn-export-pdf" id="exportPdfBtn" title="导出为 PDF">📄 导出 PDF</button>
            <button class="btn-theme-toggle" id="themeToggle" title="切换暗色模式">
                <span class="icon-sun">☀️</span>
                <span class="icon-moon">🌙</span>
            </button>
        </div>
    </header>

    <div class="toolbar" id="toolbar">
        <button class="toolbar-btn" data-action="heading">H</button>
        <button class="toolbar-btn" data-action="bold"><strong>B</strong></button>
        <button class="toolbar-btn" data-action="italic"><em>I</em></button>
        <span class="toolbar-divider"></span>
        <button class="toolbar-btn" data-action="link">🔗</button>
        <button class="toolbar-btn" data-action="image">🖼</button>
        <span class="toolbar-divider"></span>
        <button class="toolbar-btn" data-action="codeblock">&lt;/&gt;</button>
        <button class="toolbar-btn" data-action="inlinecode">`</button>
        <span class="toolbar-divider"></span>
        <button class="toolbar-btn" data-action="quote">❝</button>
        <button class="toolbar-btn" data-action="ul">•</button>
        <button class="toolbar-btn" data-action="ol">1.</button>
        <span class="toolbar-divider"></span>
        <button class="toolbar-btn" data-action="table">⊞</button>
        <button class="toolbar-btn" data-action="hr">—</button>
    </div>

    <div class="mobile-tabs" id="mobileTabs">
        <button class="mobile-tab-btn active" id="tabEditor">✏️ 编辑</button>
        <button class="mobile-tab-btn" id="tabPreview">👁 预览</button>
    </div>

    <div class="main-container" id="mainContainer">
        <div class="panel panel-editor" id="panelEditor">
            <div class="panel-header"><span><span class="dot dot-edit"></span>编辑器</span><span id="charCount">0 字符</span></div>
            <textarea class="editor-textarea" id="editor" placeholder="在此编写 Markdown…" spellcheck="false"></textarea>
        </div>
        <div class="divider-bar" id="dividerBar"></div>
        <div class="panel panel-preview" id="panelPreview">
            <div class="panel-header"><span><span class="dot dot-preview"></span>预览</span><span id="wordCount">0 字</span></div>
            <div class="preview-wrapper" id="preview">
                <div class="markdown-body"></div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const editor = document.getElementById('editor');
            const previewContent = document.getElementById('preview').querySelector('.markdown-body');
            const previewScroller = document.getElementById('preview');
            const themeToggle = document.getElementById('themeToggle');
            const exportPdfBtn = document.getElementById('exportPdfBtn');
            const charCount = document.getElementById('charCount');
            const wordCount = document.getElementById('wordCount');
            const dividerBar = document.getElementById('dividerBar');
            const mainContainer = document.getElementById('mainContainer');
            const panelEditor = document.getElementById('panelEditor');
            const panelPreview = document.getElementById('panelPreview');
            const tabEditor = document.getElementById('tabEditor');
            const tabPreview = document.getElementById('tabPreview');
            const toolbar = document.getElementById('toolbar');
            const hljsThemeLink = document.getElementById('hljs-theme');

            let isDarkMode = false;
            let isMobilePreview = false;
            const STORAGE_CONTENT = 'md-editor-content-v3';
            const STORAGE_THEME = 'md-editor-theme-v3';
            const STORAGE_SPLIT = 'md-editor-split-v3';

            let renderTimeout, saveTimeout, userScrollTimeout;
            let programmaticScroll = false;
            let editingProgrammaticScroll = false;
            let userScrollingPreview = false;

            // Marked 配置
            marked.use({ breaks: true, gfm: true });
            const renderer = new marked.Renderer();
            renderer.code = function(code, language) {
                let highlighted;
                if (language && hljs.getLanguage(language)) {
                    highlighted = hljs.highlight(code, { language }).value;
                } else {
                    highlighted = hljs.highlightAuto(code).value;
                }
                return `<pre><code class="language-${language || ''}">${highlighted}</code></pre>`;
            };
            renderer.link = (href, title, text) =>
                `<a href="${href}" target="_blank" rel="noopener noreferrer" title="${title || ''}">${text}</a>`;
            marked.use({ renderer });

            const defaultContent = `# 👋 欢迎使用 Markdown 编辑器

这是一个 **纯前端** 的 Markdown 编辑器，支持**双向实时滚动跟随**、暗色模式和**一键导出 PDF**。
滚动任意一侧，另一侧都会自动跟随；点击右上角按钮即可将当前预览导出为美观的 PDF 文档。

---

## ✨ 功能特性

- 🎨 实时预览，流畅渲染
- 🌙 暗色/亮色模式切换 (平滑过渡)
- 📱 完美适配手机、平板与桌面
- 💾 本地自动保存
- ⌨️ 常用 Markdown 工具栏与快捷键
- 🔗 **双向滚动同步** — 编辑与预览互相跟随
- 📄 **导出 PDF** — 将预览内容保存为 PDF (颜色自适应)

---

## 📝 语法示例

### 代码块

\`\`\`javascript
function greet(name) {
    return \`Hello, \${name}!\`;
}
console.log(greet('世界'));
\`\`\`

\`\`\`python
def fibonacci(n):
    if n <= 1:
        return n
    return fibonacci(n-1) + fibonacci(n-2)

print(fibonacci(10))  # 55
\`\`\`

### 表格

| 功能 | 状态 | 优先级 |
|------|------|--------|
| 实时预览 | ✅ 完成 | 高 |
| 暗色模式 | ✅ 完成 | 高 |
| 响应式 | ✅ 完成 | 中 |
| 双向跟随 | ✅ 完成 | 高 |
| PDF导出 | ✅ 完成 | 高 |

### 引用

> "简洁是智慧的灵魂，冗长是肤浅的藻饰。"

### 任务列表

- [x] 支持实时预览
- [x] 支持暗色模式
- [x] 支持双向滚动跟随
- [x] 支持导出 PDF
- [ ] 支持自定义主题
`;

            function loadContent() {
                try {
                    const saved = localStorage.getItem(STORAGE_CONTENT);
                    return saved && saved.trim() ? saved : defaultContent;
                } catch (e) { return defaultContent; }
            }

            function saveContent() {
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(() => localStorage.setItem(STORAGE_CONTENT, editor.value), 600);
            }

            // 编辑区 -> 预览区（滚动）
            function syncEditorScrollToPreview() {
                if (userScrollingPreview || !previewScroller) return;
                const maxEdit = editor.scrollHeight - editor.clientHeight;
                if (maxEdit <= 0) return;
                const ratio = editor.scrollTop / maxEdit;
                programmaticScroll = true;
                previewScroller.scrollTop = ratio * (previewScroller.scrollHeight - previewScroller.clientHeight);
            }

            function syncCursorToPreview() {
                if (userScrollingPreview || !previewScroller) return;
                const text = editor.value;
                const cursor = editor.selectionStart;
                const lines = (text.substring(0, cursor).match(/\n/g) || []).length;
                const totalLines = (text.match(/\n/g) || []).length + 1;
                const ratio = totalLines > 0 ? lines / totalLines : 0;
                requestAnimationFrame(() => {
                    programmaticScroll = true;
                    previewScroller.scrollTop = ratio * (previewScroller.scrollHeight - previewScroller.clientHeight);
                });
            }

            // 预览区 -> 编辑区
            function syncPreviewToEditor() {
                if (!previewScroller || !editor) return;
                const maxEdit = editor.scrollHeight - editor.clientHeight;
                const maxPrev = previewScroller.scrollHeight - previewScroller.clientHeight;
                if (maxPrev <= 0 || maxEdit <= 0) return;
                const ratio = previewScroller.scrollTop / maxPrev;
                editingProgrammaticScroll = true;
                editor.scrollTop = ratio * maxEdit;
            }

            function updatePreview() {
                clearTimeout(renderTimeout);
                renderTimeout = setTimeout(() => {
                    try {
                        previewContent.innerHTML = marked.parse(editor.value);
                    } catch (e) {
                        previewContent.innerHTML = '<p style="color:#e06060;">⚠️ 解析错误</p>';
                    }
                    updateStats();
                    saveContent();
                    if (!isMobile() || isMobilePreview) syncCursorToPreview();
                }, 30);
            }

            function updateStats() {
                const text = editor.value;
                charCount.textContent = `${text.length} 字符`;
                const chinese = (text.match(/[\u4e00-\u9fff]/g) || []).length;
                const words = (text.match(/[a-zA-Z]+/g) || []).length;
                wordCount.textContent = `${chinese + words} 字`;
            }

            // 暗色模式 (增强过渡)
            function applyTheme(dark, instant = false) {
                if (instant) {
                    document.body.classList.toggle('dark-mode', dark);
                    isDarkMode = dark;
                    updateHighlightTheme();
                    return;
                }
                // 平滑过渡
                document.body.style.transition = 'none';
                document.body.offsetHeight; // 强制回流
                document.body.style.transition = '';
                document.body.classList.toggle('dark-mode', dark);
                isDarkMode = dark;
                updateHighlightTheme();
                localStorage.setItem(STORAGE_THEME, dark ? 'dark' : 'light');
                updatePreview();
            }

            function updateHighlightTheme() {
                hljsThemeLink.href = isDarkMode
                    ? 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css'
                    : 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
            }

            themeToggle.addEventListener('click', () => applyTheme(!isDarkMode));

            function loadTheme() {
                const saved = localStorage.getItem(STORAGE_THEME);
                if (saved === 'dark') applyTheme(true, true);
                else if (saved === 'light') applyTheme(false, true);
                else if (window.matchMedia('(prefers-color-scheme: dark)').matches) applyTheme(true, true);
                else applyTheme(false, true);
            }

            // 导出 PDF (修复闪烁：通过 onclone 移除暗色类)
            async function exportPDF() {
                const opt = {
                    margin: 10,
                    filename: 'markdown.pdf',
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: {
                        scale: 2,
                        useCORS: true,
                        logging: false,
                        windowWidth: previewScroller.scrollWidth,
                        windowHeight: previewScroller.scrollHeight,
                        onclone: function(clonedDoc) {
                            // 在克隆文档中移除暗色类，保留亮色样式
                            clonedDoc.body.classList.remove('dark-mode');
                            // 确保代码高亮使用亮色主题（如果克隆文档包含样式表，这里可添加额外操作）
                            const link = clonedDoc.getElementById('hljs-theme');
                            if (link) {
                                link.href = 'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
                            }
                        }
                    },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                    pagebreak: { mode: 'avoid-all' }
                };
                try {
                    await html2pdf().set(opt).from(previewScroller).save();
                } catch (err) {
                    console.error('PDF 导出失败', err);
                    alert('导出失败，请稍后重试');
                }
            }
            exportPdfBtn.addEventListener('click', exportPDF);

            // 移动端标签
            function switchMobileTab(tab) {
                isMobilePreview = (tab === 'preview');
                if (tab === 'preview') {
                    panelEditor.classList.add('mobile-hidden');
                    panelPreview.classList.add('mobile-visible');
                    tabPreview.classList.add('active');
                    tabEditor.classList.remove('active');
                    updatePreview();
                } else {
                    panelEditor.classList.remove('mobile-hidden');
                    panelPreview.classList.remove('mobile-visible');
                    tabEditor.classList.add('active');
                    tabPreview.classList.remove('active');
                    editor.focus();
                }
            }
            tabEditor.onclick = () => switchMobileTab('editor');
            tabPreview.onclick = () => switchMobileTab('preview');

            function isMobile() { return window.innerWidth <= 768; }
            window.addEventListener('resize', () => {
                if (!isMobile()) {
                    panelEditor.classList.remove('mobile-hidden');
                    panelPreview.classList.remove('mobile-visible');
                }
                updatePreview();
            });

            // 分隔拖拽
            function initDivider() {
                let dragging = false, startX, startWidth;
                dividerBar.addEventListener('mousedown', (e) => {
                    if (isMobile()) return;
                    dragging = true;
                    startX = e.clientX;
                    startWidth = panelEditor.getBoundingClientRect().width;
                    document.body.style.cursor = 'col-resize';
                    document.body.style.userSelect = 'none';
                    e.preventDefault();
                });
                document.addEventListener('mousemove', (e) => {
                    if (!dragging) return;
                    const cw = mainContainer.getBoundingClientRect().width;
                    const dw = dividerBar.getBoundingClientRect().width;
                    let newWidth = startWidth + (e.clientX - startX);
                    newWidth = Math.max(180, Math.min(cw - dw - 180, newWidth));
                    const pct = (newWidth / cw) * 100;
                    panelEditor.style.flex = 'none';
                    panelEditor.style.width = `${pct}%`;
                    panelPreview.style.flex = 'none';
                    panelPreview.style.width = `${100 - pct - (dw/cw)*100}%`;
                    localStorage.setItem(STORAGE_SPLIT, pct.toFixed(1));
                });
                document.addEventListener('mouseup', () => {
                    if (dragging) {
                        dragging = false;
                        document.body.style.cursor = '';
                        document.body.style.userSelect = '';
                    }
                });
            }

            // 加载分隔比例
            (function loadSplitRatio() {
                try {
                    const saved = localStorage.getItem(STORAGE_SPLIT);
                    if (saved && !isMobile()) {
                        const pct = parseFloat(saved);
                        if (pct >= 20 && pct <= 80) {
                            const cw = mainContainer.getBoundingClientRect().width;
                            const dw = dividerBar.getBoundingClientRect().width;
                            panelEditor.style.flex = 'none';
                            panelEditor.style.width = `${pct}%`;
                            panelPreview.style.flex = 'none';
                            panelPreview.style.width = `${100 - pct - (dw/cw)*100}%`;
                        }
                    }
                } catch (e) {}
            })();

            // 工具栏操作
            function insertText(before, after, placeholder) {
                const s = editor.selectionStart, e = editor.selectionEnd;
                const sel = editor.value.substring(s, e) || placeholder || '';
                editor.value = editor.value.substring(0, s) + before + sel + after + editor.value.substring(e);
                editor.focus();
                editor.setSelectionRange(s + before.length, s + before.length + sel.length);
                updatePreview();
            }
            function insertBlock(prefix, placeholder) {
                const s = editor.selectionStart;
                const lineStart = editor.value.lastIndexOf('\n', s - 1) + 1;
                const ins = (editor.value.substring(lineStart, s).length === 0 ? '' : '\n') + prefix + (placeholder || '');
                editor.value = editor.value.substring(0, s) + ins + editor.value.substring(s);
                editor.focus();
                editor.setSelectionRange(s + ins.length, s + ins.length);
                updatePreview();
            }
            function wrapSelection(wrapper) {
                const s = editor.selectionStart, e = editor.selectionEnd;
                const sel = editor.value.substring(s, e);
                if (sel) {
                    editor.value = editor.value.substring(0, s) + wrapper + sel + wrapper + editor.value.substring(e);
                    editor.setSelectionRange(s + wrapper.length, e + wrapper.length);
                } else {
                    editor.value = editor.value.substring(0, s) + wrapper + wrapper + editor.value.substring(s);
                    editor.setSelectionRange(s + wrapper.length, s + wrapper.length);
                }
                editor.focus();
                updatePreview();
            }
            toolbar.addEventListener('click', (e) => {
                const btn = e.target.closest('.toolbar-btn');
                if (!btn) return;
                const action = btn.dataset.action;
                switch (action) {
                    case 'heading': insertBlock('### ', '标题'); break;
                    case 'bold': wrapSelection('**'); break;
                    case 'italic': wrapSelection('*'); break;
                    case 'link': insertText('[', '](url)', '链接文字'); break;
                    case 'image': insertText('![', '](url)', '图片描述'); break;
                    case 'codeblock': insertBlock('```\n', '代码\n```'); break;
                    case 'inlinecode': wrapSelection('`'); break;
                    case 'quote': insertBlock('> ', '引用内容'); break;
                    case 'ul': insertBlock('- ', '列表项'); break;
                    case 'ol': insertBlock('1. ', '列表项'); break;
                    case 'table': insertBlock('| 列1 | 列2 | 列3 |\n|-----|-----|-----|\n| 内容 | 内容 | 内容 |\n', ''); break;
                    case 'hr': insertBlock('\n---\n', ''); break;
                }
            });

            // 键盘快捷键
            editor.addEventListener('keydown', (e) => {
                if (e.key === 'Tab') {
                    e.preventDefault();
                    const s = editor.selectionStart, ed = editor.selectionEnd;
                    if (s === ed) {
                        editor.value = editor.value.substring(0, s) + '    ' + editor.value.substring(s);
                        editor.selectionStart = editor.selectionEnd = s + 4;
                    } else {
                        const lines = editor.value.substring(s, ed).split('\n');
                        editor.value = editor.value.substring(0, s) + lines.map(l => '    ' + l).join('\n') + editor.value.substring(ed);
                    }
                    updatePreview();
                }
                const ctrl = e.ctrlKey || e.metaKey;
                if (ctrl && e.key === 'b') { e.preventDefault(); wrapSelection('**'); }
                if (ctrl && e.key === 'i') { e.preventDefault(); wrapSelection('*'); }
                if (ctrl && e.key === 'k') { e.preventDefault(); insertText('[', '](url)', '链接文字'); }
            });

            // 滚动事件同步
            editor.addEventListener('scroll', () => {
                if (editingProgrammaticScroll) { editingProgrammaticScroll = false; return; }
                syncEditorScrollToPreview();
            });
            editor.addEventListener('click', () => {
                userScrollingPreview = false;
                syncCursorToPreview();
            });
            editor.addEventListener('keyup', (e) => {
                if (e.key.startsWith('Arrow') || e.key === 'Home' || e.key === 'End') syncCursorToPreview();
            });
            previewScroller.addEventListener('scroll', () => {
                if (programmaticScroll) { programmaticScroll = false; return; }
                userScrollingPreview = true;
                clearTimeout(userScrollTimeout);
                syncPreviewToEditor();
                userScrollTimeout = setTimeout(() => {
                    userScrollingPreview = false;
                    syncCursorToPreview();
                }, 2000);
            });

            editor.addEventListener('input', updatePreview);

            // 初始化
            loadTheme();
            editor.value = loadContent();
            updatePreview();
            initDivider();
            editor.focus();
            editor.setSelectionRange(editor.value.length, editor.value.length);
        })();
    </script>
</body>
</html>
