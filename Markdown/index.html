<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown 编辑器 · 实时跟随预览</title>

    <!-- Marked.js - Markdown 解析器 -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js">
    </script>
    <!-- Highlight.js - 代码高亮 -->
    <link rel="stylesheet" id="hljs-theme" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js">
    </script>

    <style>
        :root {
            /* === 亮色模式 === */
            --bg-primary: #f5f5f0;
            --bg-secondary: #ffffff;
            --bg-tertiary: #fafaf8;
            --bg-hover: #f0f0eb;
            --bg-code: #f4f4f0;
            --bg-code-block: #f8f8f5;
            --bg-toolbar: #ffffff;
            --bg-input: #fdfdfc;
            --bg-scrollbar-thumb: #c8c8c0;
            --bg-scrollbar-track: transparent;

            --text-primary: #2c2c28;
            --text-secondary: #555550;
            --text-tertiary: #888880;
            --text-code: #3a3a35;
            --text-placeholder: #b0b0a8;

            --border-primary: #e0e0d8;
            --border-secondary: #e8e8e0;
            --border-focus: #a0a098;

            --accent: #5b7b5a;
            --accent-hover: #4a6a49;
            --accent-light: #e8f0e8;
            --accent-subtle: #f0f5f0;

            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.08);

            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;

            --transition-fast: 0.15s ease;
            --transition-normal: 0.25s ease;
            --transition-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);

            --font-mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', 'Menlo',
                'Ubuntu Mono', monospace;
            --font-sans: 'Inter', 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', system-ui,
                -apple-system, sans-serif;
        }

        /* === 暗色模式 === */
        .dark-mode {
            --bg-primary: #1c1c22;
            --bg-secondary: #24242d;
            --bg-tertiary: #282832;
            --bg-hover: #2e2e38;
            --bg-code: #2a2a35;
            --bg-code-block: #1f1f28;
            --bg-toolbar: #24242d;
            --bg-input: #262630;
            --bg-scrollbar-thumb: #4a4a58;
            --bg-scrollbar-track: transparent;

            --text-primary: #e0e0e6;
            --text-secondary: #b5b5c0;
            --text-tertiary: #808090;
            --text-code: #d0d0da;
            --text-placeholder: #606070;

            --border-primary: #353545;
            --border-secondary: #3a3a4a;
            --border-focus: #6a6a7a;

            --accent: #8ab88a;
            --accent-hover: #9cc89c;
            --accent-light: #2a3a2f;
            --accent-subtle: #252e28;

            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.25);
            --shadow-md: 0 2px 8px rgba(0, 0, 0, 0.35);
            --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        /* === 全局重置 === */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            height: 100%;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background var(--transition-slow), color var(--transition-slow);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* === 自定义滚动条 === */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-scrollbar-track);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--bg-scrollbar-thumb);
            border-radius: 3px;
            transition: background var(--transition-fast);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-tertiary);
        }

        /* === 顶部导航栏 === */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-primary);
            z-index: 100;
            flex-shrink: 0;
            transition: background var(--transition-slow), border-color var(--transition-slow);
            box-shadow: var(--shadow-sm);
            min-height: 52px;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            user-select: none;
        }

        .header-logo {
            width: 34px;
            height: 34px;
            border-radius: var(--radius-sm);
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #fff;
            font-weight: 700;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(91, 123, 90, 0.3);
            transition: background var(--transition-normal), box-shadow var(--transition-normal);
        }
        .dark-mode .header-logo {
            box-shadow: 0 2px 8px rgba(138, 184, 138, 0.3);
        }

        .header-title {
            font-size: 1.1rem;
            font-weight: 650;
            letter-spacing: -0.01em;
            color: var(--text-primary);
            transition: color var(--transition-slow);
            white-space: nowrap;
        }

        .header-subtitle {
            font-size: 0.78rem;
            color: var(--text-tertiary);
            font-weight: 450;
            transition: color var(--transition-slow);
            display: none;
        }

        @media (min-width: 480px) {
            .header-subtitle {
                display: inline;
            }
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        /* === 暗色模式切换按钮 === */
        .btn-theme-toggle {
            position: relative;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid var(--border-secondary);
            background: var(--bg-tertiary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all var(--transition-normal);
            outline: none;
            color: var(--text-primary);
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
        }
        .btn-theme-toggle:hover {
            border-color: var(--accent);
            background: var(--accent-subtle);
            box-shadow: var(--shadow-md);
            transform: rotate(15deg) scale(1.05);
        }
        .btn-theme-toggle:active {
            transform: rotate(15deg) scale(0.94);
            transition: all 0.1s ease;
        }
        .btn-theme-toggle .icon-sun,
        .btn-theme-toggle .icon-moon {
            transition: all var(--transition-normal);
            position: absolute;
            line-height: 1;
        }
        .dark-mode .btn-theme-toggle .icon-sun {
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }
        .dark-mode .btn-theme-toggle .icon-moon {
            opacity: 0;
            transform: rotate(-90deg) scale(0.5);
        }
        .btn-theme-toggle .icon-sun {
            opacity: 0;
            transform: rotate(90deg) scale(0.5);
        }
        .btn-theme-toggle .icon-moon {
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }

        /* === 工具栏 === */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 6px 14px;
            background: var(--bg-toolbar);
            border-bottom: 1px solid var(--border-secondary);
            flex-shrink: 0;
            flex-wrap: wrap;
            transition: background var(--transition-slow), border-color var(--transition-slow);
            min-height: 40px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .toolbar::-webkit-scrollbar {
            height: 0;
        }

        .toolbar-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            border: 1.5px solid transparent;
            background: transparent;
            cursor: pointer;
            font-size: 15px;
            color: var(--text-secondary);
            transition: all var(--transition-fast);
            outline: none;
            flex-shrink: 0;
            position: relative;
            white-space: nowrap;
            font-family: var(--font-sans);
        }
        .toolbar-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--border-secondary);
        }
        .toolbar-btn:active {
            transform: scale(0.92);
            background: var(--accent-light);
            color: var(--accent);
            border-color: var(--accent);
            transition: all 0.08s ease;
        }
        .toolbar-btn[data-tooltip]:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text-primary);
            color: var(--bg-secondary);
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 4px;
            white-space: nowrap;
            z-index: 200;
            pointer-events: none;
            letter-spacing: 0.01em;
            font-weight: 500;
            box-shadow: var(--shadow-md);
        }
        .toolbar-divider {
            width: 1px;
            height: 20px;
            background: var(--border-secondary);
            margin: 0 4px;
            flex-shrink: 0;
            border-radius: 0.5px;
            transition: background var(--transition-slow);
        }

        /* === 移动端标签切换按钮 === */
        .mobile-tabs {
            display: none;
            flex-shrink: 0;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-primary);
            padding: 4px 12px;
            gap: 4px;
            transition: background var(--transition-slow), border-color var(--transition-slow);
        }
        .mobile-tab-btn {
            flex: 1;
            padding: 10px 16px;
            border-radius: var(--radius-md);
            border: 1.5px solid transparent;
            background: transparent;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 550;
            color: var(--text-tertiary);
            transition: all var(--transition-fast);
            outline: none;
            font-family: var(--font-sans);
            letter-spacing: 0.01em;
            text-align: center;
        }
        .mobile-tab-btn.active {
            background: var(--accent-light);
            color: var(--accent);
            border-color: var(--accent);
            font-weight: 650;
            box-shadow: var(--shadow-sm);
        }
        .mobile-tab-btn:hover:not(.active) {
            color: var(--text-primary);
            background: var(--bg-hover);
        }
        .mobile-tab-btn:active {
            transform: scale(0.96);
            transition: all 0.08s ease;
        }

        /* === 主内容区域 === */
        .main-container {
            display: flex;
            flex: 1;
            min-height: 0;
            position: relative;
            transition: all var(--transition-slow);
        }

        /* === 分隔条 === */
        .divider-bar {
            width: 6px;
            background: var(--border-primary);
            cursor: col-resize;
            flex-shrink: 0;
            transition: background var(--transition-slow);
            position: relative;
            z-index: 10;
        }
        .divider-bar:hover,
        .divider-bar.active {
            background: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-subtle);
            border-radius: 2px;
        }
        .divider-bar::after {
            content: '';
            position: absolute;
            inset: -6px 0;
            background: transparent;
            cursor: col-resize;
        }

        /* === 面板 === */
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            overflow: hidden;
            transition: background var(--transition-slow);
            background: var(--bg-input);
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-secondary);
            font-size: 0.78rem;
            font-weight: 550;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            flex-shrink: 0;
            transition: all var(--transition-slow);
            user-select: none;
        }
        .panel-header .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            flex-shrink: 0;
        }
        .dot-edit {
            background: #e8a860;
        }
        .dot-preview {
            background: #6aab6a;
        }
        .panel-char-count {
            font-size: 0.7rem;
            color: var(--text-tertiary);
            font-weight: 450;
            letter-spacing: 0.02em;
            transition: color var(--transition-slow);
        }

        /* === 编辑器 === */
        .editor-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
        }
        .editor-textarea {
            flex: 1;
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            resize: none;
            padding: 18px 20px;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            line-height: 1.7;
            color: var(--text-primary);
            background: var(--bg-input);
            transition: all var(--transition-slow);
            tab-size: 4;
            -moz-tab-size: 4;
        }
        .editor-textarea::placeholder {
            color: var(--text-placeholder);
            transition: color var(--transition-slow);
        }
        .editor-textarea:focus {
            background: var(--bg-input);
        }

        /* === 预览区 === */
        .preview-wrapper {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 18px 24px;
            background: var(--bg-input);
            transition: background var(--transition-slow);
            word-wrap: break-word;
            overflow-wrap: break-word;
            scroll-behavior: auto;
            /* 由 JavaScript 控制滚动，避免平滑滚动干扰 */;
        }

        /* === 预览区 Markdown 渲染样式 === */
        .markdown-body {
            font-family: var(--font-sans);
            color: var(--text-primary);
            line-height: 1.75;
            font-size: 0.92rem;
            max-width: 780px;
            transition: color var(--transition-slow);
        }
        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3,
        .markdown-body h4,
        .markdown-body h5,
        .markdown-body h6 {
            color: var(--text-primary);
            font-weight: 650;
            line-height: 1.3;
            margin-top: 1.6em;
            margin-bottom: 0.6em;
            letter-spacing: -0.01em;
            transition: color var(--transition-slow);
            scroll-margin-top: 20px;
        }
        .markdown-body h1 {
            font-size: 1.8rem;
            border-bottom: 2px solid var(--border-primary);
            padding-bottom: 0.35em;
            transition: border-color var(--transition-slow);
        }
        .markdown-body h2 {
            font-size: 1.45rem;
            border-bottom: 1.5px solid var(--border-secondary);
            padding-bottom: 0.3em;
            transition: border-color var(--transition-slow);
        }
        .markdown-body h3 {
            font-size: 1.2rem;
        }
        .markdown-body h4 {
            font-size: 1.05rem;
        }
        .markdown-body p {
            margin-bottom: 0.9em;
        }
        .markdown-body a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: all var(--transition-fast);
        }
        .markdown-body a:hover {
            border-bottom-color: var(--accent);
            opacity: 0.85;
        }
        .markdown-body ul,
        .markdown-body ol {
            padding-left: 1.6em;
            margin-bottom: 0.9em;
        }
        .markdown-body li {
            margin-bottom: 0.25em;
        }
        .markdown-body li>ul,
        .markdown-body li>ol {
            margin-top: 0.25em;
            margin-bottom: 0;
        }
        .markdown-body blockquote {
            border-left: 3.5px solid var(--accent);
            margin: 1em 0;
            padding: 0.6em 1em;
            background: var(--accent-subtle);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            color: var(--text-secondary);
            transition: all var(--transition-slow);
        }
        .markdown-body blockquote p:last-child {
            margin-bottom: 0;
        }
        .markdown-body code {
            font-family: var(--font-mono);
            font-size: 0.85em;
            background: var(--bg-code);
            color: var(--text-code);
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid var(--border-secondary);
            transition: all var(--transition-slow);
            white-space: nowrap;
        }
        .markdown-body pre {
            background: var(--bg-code-block);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-md);
            padding: 16px 18px;
            overflow-x: auto;
            margin: 1em 0;
            transition: all var(--transition-slow);
            box-shadow: var(--shadow-sm);
        }
        .markdown-body pre code {
            background: transparent;
            border: none;
            padding: 0;
            font-size: 0.82rem;
            line-height: 1.6;
            color: var(--text-code);
            white-space: pre;
            display: block;
        }
        .markdown-body table {
            border-collapse: collapse;
            width: 100%;
            margin: 1em 0;
            border-radius: var(--radius-sm);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: box-shadow var(--transition-slow);
        }
        .markdown-body th,
        .markdown-body td {
            border: 1px solid var(--border-primary);
            padding: 10px 14px;
            text-align: left;
            transition: border-color var(--transition-slow);
        }
        .markdown-body th {
            background: var(--bg-tertiary);
            font-weight: 600;
            transition: background var(--transition-slow);
        }
        .markdown-body tr:nth-child(even) td {
            background: var(--bg-tertiary);
            transition: background var(--transition-slow);
        }
        .markdown-body img {
            max-width: 100%;
            height: auto;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-md);
            transition: box-shadow var(--transition-slow);
        }
        .markdown-body hr {
            border: none;
            border-top: 2px solid var(--border-secondary);
            margin: 1.8em 0;
            transition: border-color var(--transition-slow);
        }
        .markdown-body strong {
            font-weight: 650;
            color: var(--text-primary);
        }
        .markdown-body em {
            font-style: italic;
        }
        .markdown-body del {
            opacity: 0.6;
        }
        .markdown-body input[type="checkbox"] {
            margin-right: 6px;
            accent-color: var(--accent);
            cursor: pointer;
            width: 15px;
            height: 15px;
            vertical-align: -2px;
        }
        .markdown-body .task-list-item {
            list-style: none;
            margin-left: -1.4em;
        }

        /* === 响应式布局 === */
        @media (max-width: 768px) {
            .mobile-tabs {
                display: flex;
            }
            .main-container {
                flex-direction: column;
            }
            .divider-bar {
                display: none;
            }
            .panel {
                flex: 1;
                min-height: 0;
            }
            .panel.panel-preview {
                display: none;
            }
            .panel.panel-preview.mobile-visible {
                display: flex;
            }
            .panel.panel-editor.mobile-hidden {
                display: none;
            }
            .panel-header {
                display: none;
            }
            .editor-textarea {
                padding: 14px 16px;
                font-size: 0.85rem;
                line-height: 1.65;
            }
            .preview-wrapper {
                padding: 14px 16px;
            }
            .markdown-body {
                font-size: 0.88rem;
                line-height: 1.7;
            }
            .markdown-body h1 {
                font-size: 1.45rem;
            }
            .markdown-body h2 {
                font-size: 1.2rem;
            }
            .markdown-body h3 {
                font-size: 1.05rem;
            }
            .header {
                padding: 8px 14px;
                min-height: 44px;
            }
            .header-title {
                font-size: 1rem;
            }
            .header-logo {
                width: 28px;
                height: 28px;
                font-size: 15px;
            }
            .toolbar {
                padding: 4px 8px;
                gap: 1px;
                min-height: 34px;
            }
            .toolbar-btn {
                width: 28px;
                height: 28px;
                font-size: 13px;
                border-radius: 4px;
            }
            .toolbar-divider {
                height: 16px;
                margin: 0 2px;
            }
            .toolbar-btn[data-tooltip]:hover::after {
                display: none;
            }
            .btn-theme-toggle {
                width: 36px;
                height: 36px;
                font-size: 17px;
            }
        }

        @media (max-width: 400px) {
            .header-title {
                font-size: 0.9rem;
            }
            .header-logo {
                width: 24px;
                height: 24px;
                font-size: 13px;
            }
            .toolbar-btn {
                width: 26px;
                height: 26px;
                font-size: 12px;
            }
            .editor-textarea {
                padding: 10px 12px;
                font-size: 0.8rem;
            }
            .preview-wrapper {
                padding: 10px 12px;
            }
            .markdown-body {
                font-size: 0.82rem;
            }
            .mobile-tab-btn {
                padding: 8px 12px;
                font-size: 0.82rem;
            }
            .btn-theme-toggle {
                width: 32px;
                height: 32px;
                font-size: 15px;
            }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .editor-textarea {
                padding: 16px 18px;
            }
            .preview-wrapper {
                padding: 16px 18px;
            }
        }

        @media (min-width: 1400px) {
            .editor-textarea {
                font-size: 0.95rem;
                padding: 22px 28px;
            }
            .preview-wrapper {
                padding: 22px 28px;
            }
            .markdown-body {
                font-size: 0.95rem;
                max-width: 860px;
            }
        }

        /* === 过渡动画 === */
        .editor-textarea,
        .preview-wrapper,
        .markdown-body,
        .markdown-body * {
            transition: background var(--transition-slow),
                color var(--transition-slow),
                border-color var(--transition-slow),

        }
    </style>
</head>
<body>

<script>
    (function() {
        // === DOM 元素 ===
        const editor = document.getElementById('editor');
        const previewContent = document.getElementById('preview').querySelector('.markdown-body');
        const previewScroller = document.getElementById('preview'); // 预览区的滚动容器
        const themeToggle = document.getElementById('themeToggle');
        const charCount = document.getElementById('charCount');
        const wordCount = document.getElementById('wordCount');
        const dividerBar = document.getElementById('dividerBar');
        const mainContainer = document.getElementById('mainContainer');
        const panelEditor = document.getElementById('panelEditor');
        const panelPreview = document.getElementById('panelPreview');
        const mobileTabs = document.getElementById('mobileTabs');
        const tabEditor = document.getElementById('tabEditor');
        const tabPreview = document.getElementById('tabPreview');
        const toolbar = document.getElementById('toolbar');
        const hljsThemeLink = document.getElementById('hljs-theme');

        // === 状态 ===
        let isDarkMode = false;
        let isMobilePreview = false; // 移动端是否正在显示预览
        const STORAGE_KEY_CONTENT = 'md-editor-content';
        const STORAGE_KEY_THEME = 'md-editor-dark-mode';
        const STORAGE_KEY_SPLIT = 'md-editor-split-ratio';

        // === 预览同步相关状态 ===
        let syncScrollEnabled = true;
        let userScrollingPreview = false;
        let programmaticScroll = false;
        let userScrollTimeout;

        // === 初始化 Marked.js ===
        marked.use({
            breaks: true,
            gfm: true,
        });

        // 配置 highlight.js
        const renderer = new marked.Renderer();
        const originalCode = renderer.code.bind(renderer);
        renderer.code = function(code, language, isEscaped) {
            let highlighted;
            if (language && typeof hljs !== 'undefined' && hljs.getLanguage(language)) {
                try {
                    highlighted = hljs.highlight(code, { language }).value;
                } catch (e) {
                    highlighted = hljs.highlightAuto(code).value;
                }
            } else if (typeof hljs !== 'undefined') {
                highlighted = hljs.highlightAuto(code).value;
            } else {
                highlighted = code;
            }
            const langClass = language ? ` class="language-${language}"` : '';
            return `<pre><code${langClass}>${highlighted}</code></pre>`;
        };

        // 自定义链接在新窗口打开
        const originalLink = renderer.link.bind(renderer);
        renderer.link = function(href, title, text) {
            const titleAttr = title ? ` title="${title}"` : '';
            return `<a href="${href}" target="_blank" rel="noopener noreferrer"${titleAttr}>${text}</a>`;
        };

        marked.use({ renderer });

        // === 默认示例内容 ===
        const defaultContent = `# 👋 欢迎使用 Markdown 编辑器

这是一个 **纯前端** 的 Markdown 编辑器，支持实时预览、暗色模式和响应式布局。
**新增功能**：预览区会自动跟随编辑区滚动或光标位置，让你随时看到对应的渲染效果。

---

## ✨ 功能特性

- 🎨 **实时预览** — 编辑内容即时渲染
- 🌙 **暗色模式** — 点击右上角按钮切换
- 📱 **响应式设计** — 适配手机、平板和电脑
- 💾 **自动保存** — 内容自动保存到本地浏览器
- ⌨️ **工具栏** — 快速插入常用 Markdown 语法
- 🔗 **预览跟随** — 编辑区滚动/光标移动时预览自动定位

---

## 📝 语法示例

### 代码块

\`\`\`javascript
function greet(name) {
    return \`Hello, \${name}!\`;
}
console.log(greet('世界'));
\`\`\`

\`\`\`python
def fibonacci(n):
    if n <= 1:
        return n
    return fibonacci(n-1) + fibonacci(n-2)

print(fibonacci(10))  # 输出: 55
\`\`\`

### 表格

| 功能 | 状态 | 优先级 |
|------|------|--------|
| 实时预览 | ✅ 完成 | 高 |
| 暗色模式 | ✅ 完成 | 高 |
| 响应式 | ✅ 完成 | 中 |
| 代码高亮 | ✅ 完成 | 中 |
| 预览跟随 | ✅ 完成 | 高 |

### 引用

> "简洁是智慧的灵魂，冗长是肤浅的藻饰。"
> — 莎士比亚

### 任务列表

- [x] 支持暗色模式
- [x] 支持响应式布局
- [x] 支持预览跟随编辑位置
- [ ] 支持导出 PDF
- [ ] 支持自定义主题

### 其他

- **粗体文本** 和 *斜体文本*
- 行内 \`code\` 示例
- [链接示例](https://example.com)
- 图片支持（自动响应式缩放）

---

> 💡 **提示**：在移动端可以使用底部标签切换编辑/预览视图。桌面端支持拖拽中间分隔条调整面板宽度。编辑时，预览区会自动滚动到当前编辑位置附近。
`;

        // === 加载保存的内容 ===
        function loadSavedContent() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY_CONTENT);
                if (saved !== null && saved.trim() !== '') {
                    return saved;
                }
            } catch (e) {
                // localStorage 不可用
            }
            return defaultContent;
        }

        // === 保存内容 ===
        let saveTimeout;
        function saveContent() {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                try {
                    localStorage.setItem(STORAGE_KEY_CONTENT, editor.value);
                } catch (e) {
                    // localStorage 不可用或已满
                }
            }, 600);
        }

        // === 预览同步函数 ===
        function syncEditorScrollToPreview() {
            if (!syncScrollEnabled || userScrollingPreview) return;
            if (!previewScroller) return;
            const editorScrollRatio = editor.scrollTop / (editor.scrollHeight - editor.clientHeight);
            if (isNaN(editorScrollRatio)) return;
            const targetScroll = editorScrollRatio * (previewScroller.scrollHeight - previewScroller.clientHeight);
            programmaticScroll = true;
            previewScroller.scrollTop = targetScroll;
            setTimeout(() => { programmaticScroll = false; }, 0);
        }

        function syncCursorToPreview() {
            if (!syncScrollEnabled || userScrollingPreview) return;
            if (!previewScroller) return;
            const text = editor.value;
            const cursor = editor.selectionStart;
            const before = text.substring(0, cursor);
            const lineNumber = (before.match(/\n/g) || []).length; // 0-based 行号
            const totalLines = (text.match(/\n/g) || []).length + 1;
            const ratio = totalLines > 0 ? lineNumber / totalLines : 0;

            // 等待预览区布局更新后再设置滚动位置
            requestAnimationFrame(() => {
                const maxScroll = previewScroller.scrollHeight - previewScroller.clientHeight;
                const targetScroll = ratio * maxScroll;
                programmaticScroll = true;
                previewScroller.scrollTop = targetScroll;
                setTimeout(() => { programmaticScroll = false; }, 0);
            });
        }

        // === 更新预览 ===
        let renderTimeout;
        function updatePreview() {
            clearTimeout(renderTimeout);
            renderTimeout = setTimeout(() => {
                const markdown = editor.value;
                try {
                    const html = marked.parse(markdown);
                    previewContent.innerHTML = html;
                } catch (e) {
                    previewContent.innerHTML = '<p style="color:#e06060;">⚠️ Markdown 解析错误，请检查语法</p>';
                }
                // 更新字数统计
                updateStats();
                // 保存内容
                saveContent();
                // 同步预览到光标位置（仅在桌面端或移动端预览可见时）
                if (!isMobile() || isMobilePreview) {
                    syncCursorToPreview();
                }
            }, 30);
        }

        // === 更新统计信息 ===
        function updateStats() {
            const text = editor.value;
            const charLen = text.length;
            // 中文字数 + 英文单词数
            const chineseChars = (text.match(/[\u4e00-\u9fff\u3400-\u4dbf]/g) || []).length;
            const englishWords = (text.match(/[a-zA-Z]+/g) || []).length;
            const totalWords = chineseChars + englishWords;

            charCount.textContent = `${charLen.toLocaleString()} 字符`;
            wordCount.textContent = `${totalWords.toLocaleString()} 字`;
        }

        // === 暗色模式 ===
        function applyTheme(dark) {
            isDarkMode = dark;
            if (dark) {
                document.body.classList.add('dark-mode');
                hljsThemeLink.href =
                    'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css';
            } else {
                document.body.classList.remove('dark-mode');
                hljsThemeLink.href =
                    'https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css';
            }
            try {
                localStorage.setItem(STORAGE_KEY_THEME, dark ? 'dark' : 'light');
            } catch (e) {}
            // 主题切换后重新渲染代码高亮
            updatePreview();
        }

        function toggleTheme() {
            applyTheme(!isDarkMode);
        }

        function loadTheme() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY_THEME);
                if (saved === 'dark') {
                    applyTheme(true);
                    return;
                } else if (saved === 'light') {
                    applyTheme(false);
                    return;
                }
            } catch (e) {}
            // 检测系统偏好
            if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                applyTheme(true);
            } else {
                applyTheme(false);
            }
        }

        // === 移动端标签切换 ===
        function switchMobileTab(tab) {
            isMobilePreview = (tab === 'preview');
            if (tab === 'preview') {
                panelEditor.classList.add('mobile-hidden');
                panelPreview.classList.add('mobile-visible');
                tabPreview.classList.add('active');
                tabEditor.classList.remove('active');
                // 切换时更新预览并同步滚动
                updatePreview();
                syncCursorToPreview();
            } else {
                panelEditor.classList.remove('mobile-hidden');
                panelPreview.classList.remove('mobile-visible');
                tabEditor.classList.add('active');
                tabPreview.classList.remove('active');
                // 切换回编辑时聚焦
                editor.focus();
            }
        }

        function isMobile() {
            return window.innerWidth <= 768;
        }

        function handleResize() {
            if (!isMobile()) {
                // 桌面端：重置移动端状态
                panelEditor.classList.remove('mobile-hidden');
                panelPreview.classList.remove('mobile-visible');
                panelPreview.style.display = '';
                panelEditor.style.display = '';
                tabEditor.classList.add('active');
                tabPreview.classList.remove('active');
                isMobilePreview = false;
                // 恢复同步滚动
                syncCursorToPreview();
            } else {
                // 移动端：应用当前标签状态
                if (isMobilePreview) {
                    panelEditor.classList.add('mobile-hidden');
                    panelPreview.classList.add('mobile-visible');
                    tabPreview.classList.add('active');
                    tabEditor.classList.remove('active');
                } else {
                    panelEditor.classList.remove('mobile-hidden');
                    panelPreview.classList.remove('mobile-visible');
                    tabEditor.classList.add('active');
                    tabPreview.classList.remove('active');
                }
            }
            // 更新预览确保渲染正确
            updatePreview();
        }

        // === 分隔条拖拽 ===
        function initDividerDrag() {
            let isDragging = false;
            let startX = 0;
            let startLeftWidth = 0;

            dividerBar.addEventListener('mousedown', (e) => {
                if (isMobile()) return;
                isDragging = true;
                startX = e.clientX;
                startLeftWidth = panelEditor.getBoundingClientRect().width;
                dividerBar.classList.add('active');
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none';
                e.preventDefault();
            });

            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const containerWidth = mainContainer.getBoundingClientRect().width;
                const dividerWidth = dividerBar.getBoundingClientRect().width;
                const deltaX = e.clientX - startX;
                let newLeftWidth = startLeftWidth + deltaX;

                // 限制最小/最大宽度
                const minWidth = Math.max(180, containerWidth * 0.2);
                const maxWidth = containerWidth - dividerWidth - Math.max(180, containerWidth * 0.2);
                newLeftWidth = Math.max(minWidth, Math.min(maxWidth, newLeftWidth));

                const leftPercent = (newLeftWidth / containerWidth) * 100;
                panelEditor.style.flex = 'none';
                panelEditor.style.width = `${leftPercent}%`;
                panelPreview.style.flex = 'none';
                panelPreview.style.width = `${100 - leftPercent - (dividerWidth / containerWidth) * 100}%`;

                // 保存比例
                try {
                    localStorage.setItem(STORAGE_KEY_SPLIT, leftPercent.toFixed(1));
                } catch (e) {}
            });

            document.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    dividerBar.classList.remove('active');
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                }
            });

            // 触摸事件支持
            dividerBar.addEventListener('touchstart', (e) => {
                if (isMobile()) return;
                isDragging = true;
                startX = e.touches[0].clientX;
                startLeftWidth = panelEditor.getBoundingClientRect().width;
                dividerBar.classList.add('active');
                document.body.style.userSelect = 'none';
                e.preventDefault();
            }, { passive: false });

            document.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                const containerWidth = mainContainer.getBoundingClientRect().width;
                const dividerWidth = dividerBar.getBoundingClientRect().width;
                const deltaX = e.touches[0].clientX - startX;
                let newLeftWidth = startLeftWidth + deltaX;
                const minWidth = Math.max(180, containerWidth * 0.2);
                const maxWidth = containerWidth - dividerWidth - Math.max(180, containerWidth * 0.2);
                newLeftWidth = Math.max(minWidth, Math.min(maxWidth, newLeftWidth));
                const leftPercent = (newLeftWidth / containerWidth) * 100;
                panelEditor.style.flex = 'none';
                panelEditor.style.width = `${leftPercent}%`;
                panelPreview.style.flex = 'none';
                panelPreview.style.width = `${100 - leftPercent - (dividerWidth / containerWidth) * 100}%`;
                try {
                    localStorage.setItem(STORAGE_KEY_SPLIT, leftPercent.toFixed(1));
                } catch (e) {}
            }, { passive: false });

            document.addEventListener('touchend', () => {
                if (isDragging) {
                    isDragging = false;
                    dividerBar.classList.remove('active');
                    document.body.style.userSelect = '';
                }
            });
        }

        // === 加载保存的分隔比例 ===
        function loadSplitRatio() {
            if (isMobile()) return;
            try {
                const saved = localStorage.getItem(STORAGE_KEY_SPLIT);
                if (saved !== null) {
                    const percent = parseFloat(saved);
                    if (percent >= 20 && percent <= 80) {
                        const containerWidth = mainContainer.getBoundingClientRect().width;
                        const dividerWidth = dividerBar.getBoundingClientRect().width;
                        panelEditor.style.flex = 'none';
                        panelEditor.style.width = `${percent}%`;
                        panelPreview.style.flex = 'none';
                        panelPreview.style.width = `${100 - percent - (dividerWidth / containerWidth) * 100}%`;
                    }
                }
            } catch (e) {}
        }

        // === 工具栏按钮功能 ===
        function insertText(before, after, placeholder) {
            const textarea = editor;
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const selectedText = textarea.value.substring(start, end);
            const replacement = before + (selectedText || placeholder || '') + after;
            textarea.value =
                textarea.value.substring(0, start) + replacement + textarea.value.substring(end);
            const newCursorPos = start + before.length + (selectedText || placeholder || '').length;
            textarea.focus();
            textarea.setSelectionRange(newCursorPos, newCursorPos);
            updatePreview();
        }

        function insertBlock(prefix, placeholder) {
            const textarea = editor;
            const start = textarea.selectionStart;
            const lineStart = textarea.value.lastIndexOf('\n', start - 1) + 1;
            const currentLine = textarea.value.substring(lineStart, start);
            const insertion = (currentLine.length === 0 ? '' : '\n') + prefix + (placeholder || '');
            textarea.value =
                textarea.value.substring(0, start) + insertion + textarea.value.substring(start);
            const newPos = start + insertion.length;
            textarea.focus();
            textarea.setSelectionRange(newPos, newPos);
            updatePreview();
        }

        function wrapSelection(wrapper) {
            const textarea = editor;
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const selectedText = textarea.value.substring(start, end);
            if (selectedText) {
                const replacement = wrapper + selectedText + wrapper;
                textarea.value =
                    textarea.value.substring(0, start) + replacement + textarea.value.substring(end);
                textarea.setSelectionRange(start + wrapper.length, end + wrapper.length);
            } else {
                const replacement = wrapper + wrapper;
                textarea.value =
                    textarea.value.substring(0, start) + replacement + textarea.value.substring(end);
                textarea.setSelectionRange(start + wrapper.length, start + wrapper.length);
            }
            textarea.focus();
            updatePreview();
        }

        toolbar.addEventListener('click', (e) => {
            const btn = e.target.closest('.toolbar-btn');
            if (!btn) return;
            const action = btn.getAttribute('data-action');
            switch (action) {
                case 'heading':
                    insertBlock('### ', '标题');
                    break;
                case 'bold':
                    wrapSelection('**');
                    break;
                case 'italic':
                    wrapSelection('*');
                    break;
                case 'link':
                    insertText('[', '](url)', '链接文字');
                    break;
                case 'image':
                    insertText('![', '](url)', '图片描述');
                    break;
                case 'codeblock':
                    insertBlock('```\n', '代码\n```');
                    break;
                case 'inlinecode':
                    wrapSelection('`');
                    break;
                case 'quote':
                    insertBlock('> ', '引用内容');
                    break;
                case 'ul':
                    insertBlock('- ', '列表项');
                    break;
                case 'ol':
                    insertBlock('1. ', '列表项');
                    break;
                case 'table':
                    insertBlock('| 列1 | 列2 | 列3 |\n|-----|-----|-----|\n| 内容 | 内容 | 内容 |\n',
                        '');
                    break;
                case 'hr':
                    insertBlock('\n---\n', '');
                    break;
                default:
                    break;
            }
        });

        // === Tab键处理 ===
        editor.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                if (start === end) {
                    // 插入缩进
                    editor.value =
                        editor.value.substring(0, start) + '    ' + editor.value.substring(end);
                    editor.selectionStart = editor.selectionEnd = start + 4;
                } else {
                    // 缩进选中多行
                    const before = editor.value.substring(0, start);
                    const selection = editor.value.substring(start, end);
                    const after = editor.value.substring(end);
                    const lines = selection.split('\n');
                    const indented = lines.map(line => '    ' + line).join('\n');
                    editor.value = before + indented + after;
                    editor.selectionStart = start;
                    editor.selectionEnd = start + indented.length;
                }
                updatePreview();
            }
            if (e.key === 'Tab' && e.shiftKey) {
                e.preventDefault();
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                const before = editor.value.substring(0, start);
                const selection = editor.value.substring(start, end);
                const after = editor.value.substring(end);
                const lines = selection.split('\n');
                const dedented = lines.map(line => line.replace(/^ {1,4}/, '')).join('\n');
                editor.value = before + dedented + after;
                editor.selectionStart = start;
                editor.selectionEnd = start + dedented.length;
                updatePreview();
            }
        });

        // === 快捷键 ===
        editor.addEventListener('keydown', (e) => {
            const ctrl = e.ctrlKey || e.metaKey;
            if (ctrl && e.key === 'b') {
                e.preventDefault();
                wrapSelection('**');
            }
            if (ctrl && e.key === 'i') {
                e.preventDefault();
                wrapSelection('*');
            }
            if (ctrl && e.key === 'k') {
                e.preventDefault();
                insertText('[', '](url)', '链接文字');
            }
            if (ctrl && e.key === '`') {
                e.preventDefault();
                wrapSelection('`');
            }
        });

        // === 事件监听：编辑器滚动同步 ===
        editor.addEventListener('scroll', syncEditorScrollToPreview);

        // === 事件监听：光标移动时同步 (点击或键盘移动) ===
        editor.addEventListener('click', () => {
            // 重置用户手动滚动标记，重新开启同步
            userScrollingPreview = false;
            syncCursorToPreview();
        });

        editor.addEventListener('keyup', (e) => {
            // 只在移动光标键或Home/End/PageUp/PageDown时同步
            if (e.key.startsWith('Arrow') || e.key === 'Home' || e.key === 'End' || e.key.startsWith('Page')) {
                syncCursorToPreview();
            }
        });

        // 当编辑器获得焦点时，重新开启同步（如果用户之前手动滚动了预览区）
        editor.addEventListener('focus', () => {
            userScrollingPreview = false;
            syncCursorToPreview();
        });

        // === 事件监听：检测用户手动滚动预览区 ===
        previewScroller.addEventListener('scroll', () => {
            if (programmaticScroll) return; // 忽略程序触发的滚动
            // 用户手动滚动了预览区
            userScrollingPreview = true;
            clearTimeout(userScrollTimeout);
            userScrollTimeout = setTimeout(() => {
                userScrollingPreview = false;
                // 延时后自动重新同步到当前编辑位置
                syncCursorToPreview();
            }, 2000); // 2秒无操作后恢复同步
        });

        // === 事件监听 ===
        editor.addEventListener('input', updatePreview);
        themeToggle.addEventListener('click', toggleTheme);
        tabEditor.addEventListener('click', () => switchMobileTab('editor'));
        tabPreview.addEventListener('click', () => switchMobileTab('preview'));
        window.addEventListener('resize', () => {
            handleResize();
            loadSplitRatio();
        });

        // 系统主题变化监听
        if (window.matchMedia) {
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
                // 仅在用户未手动设置时跟随系统
                try {
                    const saved = localStorage.getItem(STORAGE_KEY_THEME);
                    if (!saved) {
                        applyTheme(e.matches);
                    }
                } catch (er) {
                    applyTheme(e.matches);
                }
            });
        }

        // === 初始化 ===
        function init() {
            loadTheme();
            editor.value = loadSavedContent();
            updatePreview();
            handleResize();
            loadSplitRatio();
            initDividerDrag();
            editor.focus();
            // 将光标移到末尾
            const len = editor.value.length;
            editor.setSelectionRange(len, len);
            // 初始同步一次预览位置
            syncCursorToPreview();
        }

        init();

        // === 暴露API到全局 ===
        window.mdEditor = {
            getContent: () => editor.value,
            setContent: (content) => {
                editor.value = content;
                updatePreview();
            },
            toggleTheme,
            getTheme: () => (isDarkMode ? 'dark' : 'light'),
            refresh: updatePreview,
            focus: () => editor.focus(),
            syncPreview: syncCursorToPreview,
        };

        console.log('✅ Markdown 编辑器已就绪（含预览跟随功能）');
        console.log('  - 暗色模式：点击右上角 🌙 按钮切换');
        console.log('  - 移动端：使用标签切换编辑/预览');
        console.log('  - 桌面端：拖拽中间分隔条调整面板');
        console.log('  - 快捷键：Ctrl+B 加粗 | Ctrl+I 斜体 | Ctrl+K 链接');
        console.log('  - 预览跟随：编辑区滚动或光标移动时预览自动定位');
        console.log('  - 手动滚动预览区会暂停跟随，2秒后恢复');
        console.log('  - API：window.mdEditor 可控制编辑器');
    })();
</script>
</body>
</html>
