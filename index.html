<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icon.svg" type="image/x-icon">
    <title>实用工具箱</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* 日间模式变量 */
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            --container-bg: #fff;
            --text-color: #333;
            --text-secondary: #7f8c8d;
            --text-muted: #95a5a6;
            --primary-color: #3498db;
            --primary-hover: #2980b9;
            --border-color: #ddd;
            --card-bg: #fff;
            --card-shadow: rgba(0, 0, 0, 0.07);
            --card-shadow-hover: rgba(0, 0, 0, 0.12);
            --header-color: #2c3e50;
            --code-bg: #f8f9fa;
            --highlight-bg: #fff8e1;
            --highlight-color: #e65100;
        }

        .dark-mode {
            /* 暗色模式变量 */
            --bg-gradient: linear-gradient(135deg, #1a2a6c 0%, #2d3561 50%, #3d3d6b 100%);
            --container-bg: #1e2438;
            --text-color: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --border-color: #334155;
            --card-bg: #1e293b;
            --card-shadow: rgba(0, 0, 0, 0.3);
            --card-shadow-hover: rgba(0, 0, 0, 0.4);
            --header-color: #f1f5f9;
            --code-bg: #0f172a;
            --highlight-bg: rgba(251, 191, 36, 0.2);
            --highlight-color: #fbbf24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s, box-shadow 0.3s;
        }
        
        body {
            background: var(--bg-gradient);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 25px 0;
            margin-bottom: 20px;
            position: relative;
        }

        .header-content {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        header h1 {
            color: var(--header-color);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .theme-toggle {
            position: absolute;
            top: 50%;
            right: 0;
            transform: translateY(-50%);
            background: var(--card-bg);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid var(--border-color);
            box-shadow: 0 4px 15px var(--card-shadow);
        }

        .theme-toggle:hover {
            transform: translateY(-50%) rotate(15deg);
            box-shadow: 0 6px 20px var(--card-shadow-hover);
        }

        .theme-toggle i {
            font-size: 1.5rem;
            color: var(--primary-color);
        }
        
        .search-box {
            width: 100%;
            max-width: 500px;
            margin: 0 auto 30px;
            position: relative;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid var(--border-color);
            border-radius: 50px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
            background: var(--card-bg);
            color: var(--text-color);
        }
        
        .search-box input:focus {
            border-color: var(--primary-color);
        }
        
        .search-box input::placeholder {
            color: var(--text-muted);
        }
        
        .search-box i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .tool-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 15px var(--card-shadow);
            transition: all 0.3s ease;
            text-align: center;
            display: block;
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        
        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px var(--card-shadow-hover);
            text-decoration: none;
            color: inherit;
        }
        
        .tool-card:active {
            transform: translateY(2px);
        }
        
        .tool-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--primary-color);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }
        
        .tool-card:hover::after {
            transform: scaleX(1);
        }
        
        .tool-card i {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 15px;
            display: block;
            transition: transform 0.3s ease;
        }
        
        .tool-card:hover i {
            transform: scale(1.1);
        }
        
        .tool-card h3 {
            margin-bottom: 10px;
            color: var(--header-color);
            font-size: 1.3rem;
        }
        
        .tool-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.5;
        }
        
        .tool-card .url-hint {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 10px;
            display: block;
        }
        
        .instructions {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 5px 15px var(--card-shadow);
            margin-top: 30px;
            border: 1px solid var(--border-color);
        }
        
        .instructions h2 {
            color: var(--header-color);
            margin-bottom: 15px;
            font-size: 1.5rem;
        }
        
        .instructions ol {
            padding-left: 20px;
            margin-bottom: 20px;
        }
        
        .instructions li {
            margin-bottom: 10px;
            line-height: 1.6;
        }
        
        .code-example {
            background: var(--code-bg);
            border-left: 4px solid var(--primary-color);
            padding: 15px;
            border-radius: 4px;
            margin: 15px 0;
            overflow-x: auto;
            font-family: monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text-color);
        }
        
        .highlight {
            background: var(--highlight-bg);
            padding: 2px 5px;
            border-radius: 3px;
            font-weight: bold;
            color: var(--highlight-color);
        }
        
        @media (max-width: 768px) {
            .tools-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }
            
            header h1 {
                font-size: 2rem;
            }

            .theme-toggle {
                width: 44px;
                height: 44px;
            }
        }
        
        @media (max-width: 480px) {
            .tools-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div>
                    <h1>实用工具箱</h1>
                    <p>让工作更高效的工具集合</p>
                </div>
                <div class="theme-toggle" id="themeToggle" title="切换主题">
                    <i class="fas fa-moon"></i>
                </div>
            </div>
        </header>
        
        <div class="search-box">
            <input type="text" id="toolSearch" placeholder="搜索工具...">
            <i class="fas fa-search"></i>
        </div>
        
        <div class="tools-grid" id="toolsGrid">
            <!-- 单个工具卡片模板 - 使用a标签 -->
            <a href="/TypeSearch" class="tool-card" data-name="Type搜索" data-category="Type搜索">
                <i class="fas fa-image"></i>
                <h3>Type搜索</h3>
                <p>Type搜索</p>
            </a>        
            
            <!-- 第三个工具卡片示例 -->
            <a href="/Exchange" class="tool-card" data-name="单位换算" data-category="工具">
                <i class="fas fa-calculator"></i>
                <h3>单位换算</h3>
                <p>百分数小数互换</p>
            </a>

            <!-- Markdown -->
            <a href="/Markdown" class="tool-card" data-name="单位换算" data-category="工具">
                <i class="fab fa-markdown"></i>
                <h3>Markdown</h3>
                <p>Markdown 编辑器</p>
            </a>      
        </div>

        <div class="instructions">
            <h2>使用说明</h2>
            <ol>
                <li>浏览工具列表，点击您需要的工具卡片</li>
                <li>每个工具都有详细的使用说明</li>
                <li>使用搜索框快速找到特定工具</li>
            </ol>
        </div>
    </div>

    <script>
        // =============== 主题切换功能 ===============
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const themeToggle = document.getElementById('themeToggle');
            const body = document.body;

            // 检查系统偏好
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

            // 应用主题
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                body.classList.add('dark-mode');
                themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
            } else {
                body.classList.remove('dark-mode');
                themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
            }
        }

        function toggleTheme() {
            const body = document.body;
            const themeToggle = document.getElementById('themeToggle');

            if (body.classList.contains('dark-mode')) {
                body.classList.remove('dark-mode');
                themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.add('dark-mode');
                themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
                localStorage.setItem('theme', 'dark');
            }
        }

        // 监听系统主题变化
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
            if (!localStorage.getItem('theme')) {
                if (e.matches) {
                    document.body.classList.add('dark-mode');
                    document.getElementById('themeToggle').innerHTML = '<i class="fas fa-sun"></i>';
                } else {
                    document.body.classList.remove('dark-mode');
                    document.getElementById('themeToggle').innerHTML = '<i class="fas fa-moon"></i>';
                }
            }
        });

        // 初始化主题
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        });

        // =============== 搜索功能 ===============
        document.getElementById('toolSearch').addEventListener('input', function() {
            const searchText = this.value.toLowerCase().trim();
            const cards = document.querySelectorAll('.tool-card');
            
            cards.forEach(card => {
                const toolName = card.getAttribute('data-name').toLowerCase();
                const toolCategory = card.getAttribute('data-category').toLowerCase();
                const toolDescription = card.querySelector('p').textContent.toLowerCase();
                
                if (searchText === '' || 
                    toolName.includes(searchText) || 
                    toolCategory.includes(searchText) || 
                    toolDescription.includes(searchText)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
